<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>火柴人2D跑酷</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page-layout">
      <aside class="debug-tools" aria-label="调试工具">
        <div class="debug-tools-title">调试工具</div>
        <button
          id="debugDistanceButton"
          class="debug-distance-button"
          type="button"
          aria-pressed="false"
          title="显示相邻障碍物距离"
        >
          DEBUG
        </button>
        <button
          id="mobileControlsButton"
          class="mobile-controls-button"
          type="button"
          aria-pressed="false"
          title="手机端横屏游玩"
        >
          手机端
        </button>
      </aside>
      <section class="play-area">
        <div class="game-stage">
          <canvas id="gameCanvas" width="960" height="420"></canvas>
          <div id="entryPrompt" class="entry-prompt">
            <div class="entry-prompt-panel">
              <div class="entry-prompt-title">如您是手机，请切换全屏模式游玩更佳（PC端请忽略）！</div>
              <div class="entry-prompt-actions">
                <button id="entryFullscreenButton" type="button">全屏</button>
                <button id="entryIgnoreButton" type="button">忽略</button>
              </div>
            </div>
          </div>
          <div id="characterSelect" class="character-select">
            <div class="character-select-panel">
              <div class="character-select-header">
                <button id="characterBackButton" class="character-back-button" type="button">返回页面设置</button>
                <div class="character-select-title">选择角色</div>
              </div>
              <div class="character-select-main">
                <section class="character-preview-card" aria-label="角色预览">
                  <div class="character-runner-preview" aria-hidden="true">
                    <span class="preview-shadow"></span>
                    <span class="preview-head-wrap">
                      <img id="characterPreviewImage" src="character/lsj/lsj.png" alt="" />
                    </span>
                    <span class="preview-body"></span>
                    <span class="preview-arm preview-arm-front"></span>
                    <span class="preview-arm preview-arm-back"></span>
                    <span class="preview-leg preview-leg-front"></span>
                    <span class="preview-leg preview-leg-back"></span>
                  </div>
                  <div class="character-preview-copy">
                    <div id="characterPreviewName" class="character-preview-name">LSJ</div>
                    <p id="characterPreviewIntro" class="character-preview-intro"></p>
                  </div>
                </section>
                <section class="character-picker-card" aria-label="角色列表">
                  <button id="characterPrevPageButton" class="character-page-button character-page-button-prev" type="button" aria-label="上一页">‹</button>
                  <div id="characterOptions" class="character-options"></div>
                  <button id="characterNextPageButton" class="character-page-button character-page-button-next" type="button" aria-label="下一页">›</button>
                  <div id="characterPageText" class="character-page-text">1 / 1</div>
                </section>
              </div>
              <div class="character-select-footer">
                <div class="character-skill-panel">
                  <div id="characterSkillTitle" class="character-skill-title">秘境能量</div>
                  <p id="characterSkillDescription" class="character-skill-description"></p>
                </div>
                <button id="characterStartButton" class="character-start-button" type="button">进入游戏</button>
              </div>
            </div>
          </div>
          <div class="hud">
            <div id="score">分数: 0 | 最高分: 0</div>
          </div>
          <div class="secret-progress" aria-label="秘境进度">
            <div class="secret-progress-orb">
              <span>秘</span>
            </div>
            <div class="secret-progress-body">
              <div class="secret-progress-topline">
                <span>秘境能量</span>
                <span id="secretProgressText">0 / 400</span>
              </div>
              <div class="secret-progress-track">
                <div id="secretProgressFill" class="secret-progress-fill"></div>
              </div>
              <div id="secretProgressHint" class="secret-progress-hint">收集金币充能</div>
            </div>
          </div>
          <button
            id="pauseButton"
            class="pause-button"
            type="button"
            aria-label="暂停游戏"
            title="暂停游戏"
          >
            <span class="pause-icon pause-icon-pause" aria-hidden="true"></span>
          </button>
          <button
            id="exitMobileButton"
            class="exit-mobile-button"
            type="button"
            aria-label="退出全屏"
            title="退出全屏"
          >
            退出
          </button>
          <div id="mobileControls" class="mobile-controls" aria-hidden="true">
            <button id="mobileSlideButton" class="mobile-action mobile-action-slide" type="button" aria-label="下铲">
              <span>下铲</span>
            </button>
            <button id="mobileSkillButton" class="mobile-action mobile-action-skill" type="button" aria-label="释放技能">
              <span>技能</span>
            </button>
            <button id="mobileJumpButton" class="mobile-action mobile-action-jump" type="button" aria-label="跳跃">
              <span>跳跃</span>
            </button>
          </div>
          <div id="settlementOverlay" class="settlement-overlay" aria-hidden="true">
            <div class="settlement-panel" role="dialog" aria-modal="true" aria-labelledby="settlementTitle">
              <div id="settlementTitle" class="settlement-title">恭喜您！</div>
              <div id="settlementScore" class="settlement-score">您的得分为 0</div>
              <p id="settlementMessage" class="settlement-message"></p>
              <form id="settlementForm" class="settlement-form">
                <label for="settlementNameInput">请输入名称</label>
                <div class="settlement-input-row">
                  <input id="settlementNameInput" maxlength="16" autocomplete="nickname" placeholder="玩家名称" />
                  <button id="settlementSubmitButton" type="submit">记录排行</button>
                </div>
              </form>
              <button id="settlementRestartButton" class="settlement-restart-button" type="button">再来一局</button>
            </div>
          </div>
        </div>
        <div class="tips">
          空格 / W / ↑ / 点击跳跃（支持二段跳），S / ↓ 可空中速降/地面下铲，收集金币满400按E可开技能进入秘境
        </div>
      </section>
    </main>
    <script src="./js/config.js"></script>
    <script src="./js/storage.js"></script>
    <script src="./js/state.js"></script>
    <script src="./js/audio.js"></script>
    <script src="./js/actions.js"></script>
    <script src="./js/spawners.js"></script>
    <script src="./js/effects.js"></script>
    <script src="./js/update.js"></script>
    <script src="./js/render.js"></script>
    <script src="./js/leaderboard.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
