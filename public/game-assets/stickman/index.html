<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>火柴人2D跑酷</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="game-stage">
      <canvas id="gameCanvas" width="960" height="420"></canvas>
      <div class="hud">
        <div id="score">分数: 0 | 最高分: 0</div>
      </div>
      <button
        id="pauseButton"
        class="pause-button"
        type="button"
        aria-label="暂停游戏"
        title="暂停游戏"
      >
        <span class="pause-icon pause-icon-pause" aria-hidden="true"></span>
      </button>
    </div>
    <div class="tips">
      空格 / W / ↑ / 点击跳跃（支持二段跳），S / ↓ 可空中速降/地面下铲，躲避长横梁障碍（必须下铲）
    </div>
    <script src="./js/config.js"></script>
    <script src="./js/storage.js"></script>
    <script src="./js/state.js"></script>
    <script src="./js/audio.js"></script>
    <script src="./js/actions.js"></script>
    <script src="./js/spawners.js"></script>
    <script src="./js/effects.js"></script>
    <script src="./js/update.js"></script>
    <script src="./js/render.js"></script>
    <script src="./js/leaderboard.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
